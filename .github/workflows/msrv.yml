name: msrv

on:
  pull_request:
  push:
    tags:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate-path:
          - web_push
          - ece
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - run: cargo install cargo-msrv
      - run: cargo msrv --path ${{ matrix.crate-path }} verify
